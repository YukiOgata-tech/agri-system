# =============================================================
# Agri-System Connector Operations v2
# 場所中心のデータ構造を維持しつつ、作物文脈で画面を切り替えるための基本操作
# =============================================================

# ==================== Queries ====================

query GetUserByAuthUid($authUid: String!) @auth(level: USER) {
  users(where: { authUid: { eq: $authUid } }) {
    id
    authUid
    email
    displayName
  }
}

query GetOrganizationMembersByAuthUid($authUid: String!) @auth(level: USER) {
  organizationMembers(where: { user: { authUid: { eq: $authUid } } }) {
    id
    role
    organization {
      id
      name
    }
  }
}

query GetOrganizationsByOwner($ownerId: UUID!) @auth(level: USER) {
  organizations(where: { owner: { id: { eq: $ownerId } } }) {
    id
    name
  }
}

query GetOrganizationById($organizationId: UUID!) @auth(level: USER) {
  organizations(where: { id: { eq: $organizationId } }) {
    id
    name
    prefecture
    city
    status
  }
}

query GetFarmsByOrg($organizationId: UUID!) @auth(level: USER) {
  farms(where: { organization: { id: { eq: $organizationId } } }, orderBy: [{ createdAt: ASC }]) {
    id
    name
    prefecture
    city
    notes
  }
}

query GetProductionUnitsByFarm($farmId: UUID!) @auth(level: USER) {
  productionUnits(
    where: { farm: { id: { eq: $farmId } } }
    orderBy: [{ name: ASC }]
  ) {
    id
    name
    code
    unitType
    areaM2
    isActive
    parentUnit { id name }
    notes
  }
}

query GetProductionUnitsByOrganization($organizationId: UUID!) @auth(level: USER) {
  productionUnits(
    where: { farm: { organization: { id: { eq: $organizationId } } } }
    orderBy: [{ name: ASC }]
  ) {
    id
    name
    code
    unitType
    areaM2
    isActive
    coveringMaterial
    irrigationSystemType
    bedCount
    rowCount
    notes
    parentUnit { id }
    farm { id name }
  }
}

query GetOrganizationCropSettings($organizationId: UUID!) @auth(level: USER) {
  organizationCropSettings(
    where: { organization: { id: { eq: $organizationId } }, isEnabled: { eq: true } }
    orderBy: [{ cropType: { nameJa: ASC } }]
  ) {
    id
    aiAnalysisEnabled
    defaultDashboard
    pricingTier
    recordMode
    cropType {
      id
      code
      nameJa
      cultivationCategory
      defaultYieldUnit
      defaultShipmentUnit
    }
  }
}

query GetOrganizationMembersByOrganization($organizationId: UUID!) @auth(level: USER) {
  organizationMembers(
    where: { organization: { id: { eq: $organizationId } } }
    orderBy: [{ createdAt: ASC }]
  ) {
    id
    role
    invitationStatus
    organization {
      id
      name
    }
    user {
      id
      authUid
      email
      displayName
    }
  }
}

query GetCultivationCyclesByProductionUnit($productionUnitId: UUID!) @auth(level: USER) {
  cultivationCycles(
    where: { productionUnit: { id: { eq: $productionUnitId } } }
    orderBy: [{ startDate: DESC }]
  ) {
    id
    cycleName
    startDate
    endDate
    plantingDate
    status
    primaryRecordUnit
    secondaryRecordUnit
    shipmentUnit
    plantedCount
    cropType { id nameJa }
    cropVariety { id name }
  }
}

query GetCultivationCyclesByCrop($organizationId: UUID!, $cropTypeId: UUID!) @auth(level: USER) {
  cultivationCycles(
    where: {
      cropType: { id: { eq: $cropTypeId } }
      productionUnit: { farm: { organization: { id: { eq: $organizationId } } } }
    }
    orderBy: [{ startDate: DESC }]
  ) {
    id
    cycleName
    startDate
    status
    primaryRecordUnit
    shipmentUnit
    productionUnit { id name unitType }
    cropVariety { id name }
  }
}

query GetCultivationCyclesByOrganization($organizationId: UUID!) @auth(level: USER) {
  cultivationCycles(
    where: { productionUnit: { farm: { organization: { id: { eq: $organizationId } } } } }
    orderBy: [{ startDate: DESC }]
  ) {
    id
    cycleName
    startDate
    endDate
    plantingDate
    expectedHarvestStartDate
    expectedHarvestEndDate
    status
    primaryRecordUnit
    secondaryRecordUnit
    shipmentUnit
    plantedCount
    plantedAreaM2
    sourceBatchCode
    notes
    productionUnit { id }
    cropType { id code nameJa }
    cropVariety { id name }
  }
}

query GetHarvestRecords($productionUnitId: UUID!, $from: Date!, $to: Date!) @auth(level: USER) {
  harvestRecords(
    where: {
      productionUnit: { id: { eq: $productionUnitId } }
      harvestDate: { ge: $from, le: $to }
    }
    orderBy: [{ harvestDate: DESC }]
  ) {
    id
    lotCode
    harvestDate
    quantityValue
    quantityUnit
    normalizedWeightKg
    packageCount
    packageUnit
    qualityGrade
    wasteWeightKg
    sourceType
    notes
    cultivationCycle {
      id
      cycleName
      cropType { id nameJa }
    }
  }
}

query GetHarvestRecordsByOrganization($organizationId: UUID!, $from: Date!, $to: Date!) @auth(level: USER) {
  harvestRecords(
    where: {
      productionUnit: { farm: { organization: { id: { eq: $organizationId } } } }
      harvestDate: { ge: $from, le: $to }
    }
    orderBy: [{ harvestDate: DESC }]
  ) {
    id
    lotCode
    harvestDate
    quantityValue
    quantityUnit
    normalizedWeightKg
    packageCount
    packageUnit
    qualityGrade
    wasteWeightKg
    sourceType
    notes
    productionUnit { id }
    cultivationCycle {
      id
      cycleName
      cropType { id code nameJa }
    }
  }
}

query GetShipmentRecords($productionUnitId: UUID!, $from: Date!, $to: Date!) @auth(level: USER) {
  shipmentRecords(
    where: {
      productionUnit: { id: { eq: $productionUnitId } }
      shipmentDate: { ge: $from, le: $to }
    }
    orderBy: [{ shipmentDate: DESC }]
  ) {
    id
    shipmentDate
    shipmentLotCode
    quantityValue
    quantityUnit
    normalizedWeightKg
    packageCount
    packageUnit
    averageUnitPrice
    revenueAmount
    destinationName
    harvestRecord { id lotCode }
    cultivationCycle {
      id
      cropType { id nameJa }
    }
  }
}

query GetShipmentRecordsByOrganization($organizationId: UUID!, $from: Date!, $to: Date!) @auth(level: USER) {
  shipmentRecords(
    where: {
      productionUnit: { farm: { organization: { id: { eq: $organizationId } } } }
      shipmentDate: { ge: $from, le: $to }
    }
    orderBy: [{ shipmentDate: DESC }]
  ) {
    id
    shipmentDate
    shipmentLotCode
    quantityValue
    quantityUnit
    normalizedWeightKg
    packageCount
    packageUnit
    averageUnitPrice
    revenueAmount
    destinationName
    notes
    productionUnit { id }
    harvestRecord { id lotCode }
    cultivationCycle {
      id
      cropType { id code nameJa }
    }
  }
}

query GetWorkLogs($productionUnitId: UUID!, $from: Date!, $to: Date!) @auth(level: USER) {
  workLogs(
    where: {
      productionUnit: { id: { eq: $productionUnitId } }
      workDate: { ge: $from, le: $to }
    }
    orderBy: [{ workDate: DESC }]
  ) {
    id
    workDate
    workType
    durationMinutes
    workerCount
    status
    sourceType
    note
    operator { id displayName }
    irrigationLog { id waterVolumeL method timingType }
  }
}

query GetWorkLogsByOrganization($organizationId: UUID!, $from: Date!, $to: Date!) @auth(level: USER) {
  workLogs(
    where: {
      productionUnit: { farm: { organization: { id: { eq: $organizationId } } } }
      workDate: { ge: $from, le: $to }
    }
    orderBy: [{ workDate: DESC }]
  ) {
    id
    workDate
    workType
    durationMinutes
    workerCount
    status
    sourceType
    note
    productionUnit { id }
    cultivationCycle {
      id
      cropType { id code nameJa }
    }
    operator { id displayName }
    copiedFromWorkLog { id }
    irrigationLog { id waterVolumeL method timingType }
  }
}

query GetWorkMaterialUsages($workLogId: UUID!) @auth(level: USER) {
  workMaterialUsages(where: { workLog: { id: { eq: $workLogId } } }) {
    id
    usageQuantityValue
    usageQuantityUnit
    normalizedUsageKg
    normalizedUsageL
    targetPestOrDisease
    dilutionRatio
    preharvestIntervalDays
    materialLot {
      id
      lotCode
      material {
        id
        name
        materialType
      }
    }
  }
}

query GetWorkMaterialUsagesByOrganization($organizationId: UUID!) @auth(level: USER) {
  workMaterialUsages(
    where: { workLog: { productionUnit: { farm: { organization: { id: { eq: $organizationId } } } } } }
  ) {
    id
    usageQuantityValue
    usageQuantityUnit
    normalizedUsageKg
    normalizedUsageL
    targetPestOrDisease
    dilutionRatio
    preharvestIntervalDays
    workLog { id }
    materialLot {
      id
      lotCode
      material {
        id
        name
        materialType
      }
    }
  }
}

query GetEnvironmentLogs($productionUnitId: UUID!, $from: Timestamp!, $to: Timestamp!) @auth(level: USER) {
  productionUnitEnvironmentLogs(
    where: {
      productionUnit: { id: { eq: $productionUnitId } }
      observedAt: { ge: $from, le: $to }
    }
    orderBy: [{ observedAt: DESC }]
  ) {
    id
    observedAt
    temperatureC
    humidityPct
    co2Ppm
    soilTemperatureC
    soilMoisturePct
    ecDsM
    ph
    lightLux
    sourceType
    notes
  }
}

query GetEnvironmentLogsByOrganization($organizationId: UUID!, $from: Timestamp!, $to: Timestamp!) @auth(level: USER) {
  productionUnitEnvironmentLogs(
    where: {
      productionUnit: { farm: { organization: { id: { eq: $organizationId } } } }
      observedAt: { ge: $from, le: $to }
    }
    orderBy: [{ observedAt: DESC }]
  ) {
    id
    observedAt
    temperatureC
    humidityPct
    co2Ppm
    soilTemperatureC
    soilMoisturePct
    ecDsM
    ph
    lightLux
    sourceType
    notes
    productionUnit { id }
  }
}

query GetDiseasePestIncidents($productionUnitId: UUID!) @auth(level: USER) {
  diseasePestIncidents(
    where: { productionUnit: { id: { eq: $productionUnitId } } }
    orderBy: [{ occurredOn: DESC }]
  ) {
    id
    occurredOn
    category
    name
    severityLevel
    affectedAreaRatio
    actionTaken
    resolvedOn
    sourceType
    note
  }
}

query GetDiseasePestIncidentsByOrganization($organizationId: UUID!) @auth(level: USER) {
  diseasePestIncidents(
    where: { productionUnit: { farm: { organization: { id: { eq: $organizationId } } } } }
    orderBy: [{ occurredOn: DESC }]
  ) {
    id
    occurredOn
    category
    name
    severityLevel
    affectedAreaRatio
    actionTaken
    resolvedOn
    sourceType
    note
    productionUnit { id }
    cultivationCycle {
      id
      cropType { id code nameJa }
    }
  }
}

query GetInputMaterials($organizationId: UUID!) @auth(level: USER) {
  inputMaterials(
    where: { organization: { id: { eq: $organizationId } } }
    orderBy: [{ name: ASC }]
  ) {
    id
    materialType
    name
    manufacturer
    activeIngredient
    defaultUnit
  }
}

query GetMaterialLots($organizationId: UUID!, $materialId: UUID) @auth(level: USER) {
  materialLots(
    where: {
      organization: { id: { eq: $organizationId } }
      material: { id: { eq: $materialId } }
    }
    orderBy: [{ purchasedOn: DESC }]
  ) {
    id
    lotCode
    supplierName
    purchasedOn
    expiresOn
    receivedQuantityValue
    receivedQuantityUnit
    remainingQuantityValue
    remainingQuantityUnit
    status
  }
}

query GetMaterialLotsByOrganization($organizationId: UUID!) @auth(level: USER) {
  materialLots(
    where: { organization: { id: { eq: $organizationId } } }
    orderBy: [{ purchasedOn: DESC }]
  ) {
    id
    lotCode
    supplierName
    purchasedOn
    expiresOn
    receivedQuantityValue
    receivedQuantityUnit
    remainingQuantityValue
    remainingQuantityUnit
    status
    material {
      id
      name
      materialType
    }
  }
}

query GetCropTypes @auth(level: PUBLIC) {
  cropTypes(orderBy: [{ nameJa: ASC }]) {
    id
    code
    nameJa
    nameEn
    cultivationCategory
    defaultYieldUnit
    defaultShipmentUnit
  }
}

query GetCropVarieties($cropTypeId: UUID!) @auth(level: PUBLIC) {
  cropVarieties(where: { cropType: { id: { eq: $cropTypeId } } }, orderBy: [{ name: ASC }]) {
    id
    name
    producer
    characteristics
  }
}

# ==================== Mutations ====================

mutation CreateUser(
  $authUid: String!
  $email: String!
  $displayName: String
  $authProvider: String
) @auth(level: USER) {
  user_insert(data: {
    authUid: $authUid
    email: $email
    displayName: $displayName
    authProvider: $authProvider
  })
}

mutation UpdateUserProfile(
  $id: UUID!
  $email: String!
  $displayName: String
  $lastLoginAt: Timestamp
) @auth(level: USER) {
  user_update(id: $id, data: {
    email: $email
    displayName: $displayName
    lastLoginAt: $lastLoginAt
  })
}

mutation CreateOrganization(
  $ownerId: UUID!
  $name: String!
  $prefecture: String
  $city: String
) @auth(level: USER) {
  organization_insert(data: {
    ownerId: $ownerId
    name: $name
    prefecture: $prefecture
    city: $city
    status: "active"
  })
}

mutation CreateOrganizationMember(
  $organizationId: UUID!
  $userId: UUID!
  $role: String!
) @auth(level: USER) {
  organizationMember_insert(data: {
    organizationId: $organizationId
    userId: $userId
    role: $role
    invitationStatus: "accepted"
  })
}

mutation CreateFarm(
  $organizationId: UUID!
  $name: String!
  $prefecture: String
  $city: String
  $notes: String
) @auth(level: USER) {
  farm_insert(data: {
    organizationId: $organizationId
    name: $name
    prefecture: $prefecture
    city: $city
    notes: $notes
  })
}

mutation CreateCropType(
  $code: String!
  $nameJa: String!
  $cultivationCategory: String
  $defaultYieldUnit: String
  $defaultShipmentUnit: String
) @auth(level: USER) {
  cropType_insert(data: {
    code: $code
    nameJa: $nameJa
    cultivationCategory: $cultivationCategory
    defaultYieldUnit: $defaultYieldUnit
    defaultShipmentUnit: $defaultShipmentUnit
  })
}

mutation CreateCropVariety(
  $cropTypeId: UUID!
  $name: String!
) @auth(level: USER) {
  cropVariety_insert(data: {
    cropTypeId: $cropTypeId
    name: $name
  })
}

mutation CreateInputMaterial(
  $organizationId: UUID!
  $materialType: String!
  $name: String!
  $defaultUnit: String
) @auth(level: USER) {
  inputMaterial_insert(data: {
    organizationId: $organizationId
    materialType: $materialType
    name: $name
    defaultUnit: $defaultUnit
  })
}

mutation CreateProductionUnit(
  $farmId: UUID!
  $parentUnitId: UUID
  $unitType: String!
  $name: String!
  $code: String
  $areaM2: Float
  $notes: String
) @auth(level: USER) {
  productionUnit_insert(data: {
    farmId: $farmId
    parentUnitId: $parentUnitId
    unitType: $unitType
    name: $name
    code: $code
    areaM2: $areaM2
    notes: $notes
    isActive: true
  })
}

mutation UpdateProductionUnitActive(
  $id: UUID!
  $isActive: Boolean!
) @auth(level: USER) {
  productionUnit_update(id: $id, data: {
    isActive: $isActive
  })
}

mutation DeleteWorkMaterialUsage($id: UUID!) @auth(level: USER) {
  workMaterialUsage_delete(id: $id)
}

mutation DeleteIrrigationLog($id: UUID!) @auth(level: USER) {
  irrigationLog_delete(id: $id)
}

mutation DeleteWorkLog($id: UUID!) @auth(level: USER) {
  workLog_delete(id: $id)
}

mutation DeleteEnvironmentLog($id: UUID!) @auth(level: USER) {
  productionUnitEnvironmentLog_delete(id: $id)
}

mutation DeleteDiseasePestIncident($id: UUID!) @auth(level: USER) {
  diseasePestIncident_delete(id: $id)
}

mutation DeleteShipmentRecord($id: UUID!) @auth(level: USER) {
  shipmentRecord_delete(id: $id)
}

mutation DeleteHarvestRecord($id: UUID!) @auth(level: USER) {
  harvestRecord_delete(id: $id)
}

mutation DeleteCultivationCycle($id: UUID!) @auth(level: USER) {
  cultivationCycle_delete(id: $id)
}

mutation DeleteProductionUnit($id: UUID!) @auth(level: USER) {
  productionUnit_delete(id: $id)
}

mutation DeleteMaterialLot($id: UUID!) @auth(level: USER) {
  materialLot_delete(id: $id)
}

mutation DeleteInputMaterial($id: UUID!) @auth(level: USER) {
  inputMaterial_delete(id: $id)
}

mutation DeleteOrganizationCropSetting($id: UUID!) @auth(level: USER) {
  organizationCropSetting_delete(id: $id)
}

mutation CreateOrganizationCropSetting(
  $organizationId: UUID!
  $cropTypeId: UUID!
  $aiAnalysisEnabled: Boolean
  $defaultDashboard: Boolean
  $pricingTier: String
  $recordMode: String
) @auth(level: USER) {
  organizationCropSetting_insert(data: {
    organizationId: $organizationId
    cropTypeId: $cropTypeId
    isEnabled: true
    aiAnalysisEnabled: $aiAnalysisEnabled
    defaultDashboard: $defaultDashboard
    pricingTier: $pricingTier
    recordMode: $recordMode
  })
}

mutation CreateCultivationCycle(
  $productionUnitId: UUID!
  $cropTypeId: UUID!
  $cropVarietyId: UUID
  $cycleName: String!
  $startDate: Date!
  $plantingDate: Date
  $primaryRecordUnit: String
  $secondaryRecordUnit: String
  $shipmentUnit: String
  $plantedCount: Int
  $notes: String
) @auth(level: USER) {
  cultivationCycle_insert(data: {
    productionUnitId: $productionUnitId
    cropTypeId: $cropTypeId
    cropVarietyId: $cropVarietyId
    cycleName: $cycleName
    startDate: $startDate
    plantingDate: $plantingDate
    primaryRecordUnit: $primaryRecordUnit
    secondaryRecordUnit: $secondaryRecordUnit
    shipmentUnit: $shipmentUnit
    plantedCount: $plantedCount
    status: "active"
    notes: $notes
  })
}

mutation CreateHarvestRecord(
