  $notes: String
) @auth(level: USER) {
  harvestRecord_insert(data: {
    productionUnitId: $productionUnitId
    cultivationCycleId: $cultivationCycleId
    lotCode: $lotCode
    harvestDate: $harvestDate
    quantityValue: $quantityValue
    quantityUnit: $quantityUnit
    normalizedWeightKg: $normalizedWeightKg
    packageCount: $packageCount
    packageUnit: $packageUnit
    qualityGrade: $qualityGrade
    wasteWeightKg: $wasteWeightKg
    recordedByUserId: $recordedByUserId
    notes: $notes
    sourceType: "manual"
  })
}

mutation CreateShipmentRecord(
  $productionUnitId: UUID!
  $cultivationCycleId: UUID
  $harvestRecordId: UUID
  $shipmentDate: Date!
  $shipmentLotCode: String
  $quantityValue: Float
