  $notes: String
) @auth(level: USER) {
  pesticideLog_insert(data: {
    workLogId: $workLogId
    pesticideName: $pesticideName
    activeIngredient: $activeIngredient
    targetPestOrDisease: $targetPestOrDisease
    amount: $amount
    unit: $unit
