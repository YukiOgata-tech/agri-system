mutation CreateEnvironmentLog(
  $productionUnitId: UUID!
  $observedAt: Timestamp!
  $temperatureC: Float
  $humidityPct: Float
  $co2Ppm: Float
  $soilTemperatureC: Float
  $soilMoisturePct: Float
  $ecDsM: Float
  $ph: Float
  $lightLux: Float
  $recordedByUserId: UUID
  $notes: String
) @auth(level: USER) {
  productionUnitEnvironmentLog_insert(data: {
    productionUnitId: $productionUnitId
    observedAt: $observedAt
    temperatureC: $temperatureC
    humidityPct: $humidityPct
    co2Ppm: $co2Ppm
    soilTemperatureC: $soilTemperatureC
    soilMoisturePct: $soilMoisturePct
    ecDsM: $ecDsM
    ph: $ph
    lightLux: $lightLux
    recordedByUserId: $recordedByUserId
    notes: $notes
    sourceType: "manual"
  })
}

mutation CreateDiseasePestIncident(
  $productionUnitId: UUID!
  $cultivationCycleId: UUID
  $occurredOn: Date!
  $category: String!
  $name: String!
  $severityLevel: Int
  $affectedAreaRatio: Float
  $actionTaken: String
  $note: String
) @auth(level: USER) {
  diseasePestIncident_insert(data: {
    productionUnitId: $productionUnitId
    cultivationCycleId: $cultivationCycleId
    occurredOn: $occurredOn
    category: $category
    name: $name
    severityLevel: $severityLevel
    affectedAreaRatio: $affectedAreaRatio
    actionTaken: $actionTaken
    note: $note
    sourceType: "manual"
  })
}

mutation ResolveDiseasePestIncident(
  $id: UUID!
  $resolvedOn: Date!
) @auth(level: USER) {
  diseasePestIncident_update(id: $id, data: {
    resolvedOn: $resolvedOn
  })
}
